# MEK Isoforms benchmark (d=6, multi-model) - S-CREAM
# Miller et al. 2025, 5 simultaneous model fits with constraints

model = MEK1_WT.bngl : WT.prop, WT.exp
model = MEK1_KO.bngl : KO.prop
model = MEK1_N78G.bngl : N78G.prop
model = MEK1_T292A.bngl : T292A.prop
model = MEK1_T292D.bngl : T292D.prop

objfunc = chi_sq_dynamic

loguniform_var = d3__FREE 1e-5 1e-1
loguniform_var = u3__FREE 1e-5 1e-1
loguniform_var = sigma__FREE 0.1 10
loguniform_var = scalepEGFR__FREE 3.0e-05 6.0e-05
loguniform_var = scalepERK__FREE 2.0e-06 5.0e-06
loguniform_var = scalepSos1__FREE 0.00009 0.0003

fit_type = s_cream
population_size = 20
parallel_count = 20
max_iterations = 100000
burn_in = 50000
sample_every = 10
output_hist_every = 100
hist_bins = 50
save_best_data = 1
output_trajectory = MEK_pRDS_WT, scaled_pSOS1, scaled_pEGFR, scaled_pERK, MEK_pRDS_KO, MEK_pRDS_N78G, MEK_pRDS_T292A, MEK_pRDS_T292D
rhat_threshold = 0
verbosity = 2
delete_old_files = 1
output_dir = output_s_cream/
