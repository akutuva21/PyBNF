# HIVdynamics benchmark (d=5) - Adaptive MCMC
model = pt303.bngl : pt303.exp
output_dir = output_am/
objfunc = chi_sq_dynamic
fit_type = am

uniform_var = A__FREE 0 1
uniform_var = d1__FREE 0 1
uniform_var = d2__FREE 0 1
uniform_var = V0__FREE 0 2000
uniform_var = sigma__FREE 0 10

population_size = 20
parallel_count = 20
max_iterations = 100000
burn_in = 50000
sample_every = 10
output_hist_every = 100
hist_bins = 50
step_size = 0.2
adaptive = 20000
output_trajectory = lnV
rhat_threshold = 0
verbosity = 2
delete_old_files = 1
