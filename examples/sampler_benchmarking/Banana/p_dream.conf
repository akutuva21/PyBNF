# Banana benchmark (d=2) - P-DREAM
model = banana.target : target.exp
output_dir = output_p_dream/
objfunc = direct_pass
fit_type = p_dream

uniform_var = x1 -5 5
uniform_var = x2 -5 15

population_size = 20
parallel_count = 20
max_iterations = 50000
burn_in = 25000
sample_every = 10
output_hist_every = 100
hist_bins = 50
rhat_threshold = 0
verbosity = 2
delete_old_files = 1
wall_time_sim = 0
