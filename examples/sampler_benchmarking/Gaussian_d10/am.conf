# Gaussian_d10 benchmark (d=10) - Adaptive MCMC
model = gaussian_d10.target : target.exp
output_dir = output_am/
objfunc = direct_pass
fit_type = am

uniform_var = p1 -10 10
uniform_var = p2 -10 10
uniform_var = p3 -10 10
uniform_var = p4 -10 10
uniform_var = p5 -10 10
uniform_var = p6 -10 10
uniform_var = p7 -10 10
uniform_var = p8 -10 10
uniform_var = p9 -10 10
uniform_var = p10 -10 10

population_size = 20
parallel_count = 20
max_iterations = 50000
burn_in = 25000
sample_every = 10
output_hist_every = 100
hist_bins = 50
step_size = 0.5
adaptive = 10000
rhat_threshold = 0
verbosity = 2
delete_old_files = 1
wall_time_sim = 0
