# Gaussian d=10 benchmark - S-CREAM
model = gaussian_d10.target : target.exp
output_dir = output_scream/
objfunc = direct_pass
fit_type = s_cream

uniform_var = p1 -10 10
uniform_var = p2 -10 10
uniform_var = p3 -10 10
uniform_var = p4 -10 10
uniform_var = p5 -10 10
uniform_var = p6 -10 10
uniform_var = p7 -10 10
uniform_var = p8 -10 10
uniform_var = p9 -10 10
uniform_var = p10 -10 10

population_size = 10
max_iterations = 8000
burn_in = 3000
sample_every = 10
output_hist_every = 50
hist_bins = 50
rhat_threshold = 1.05
verbosity = 2
delete_old_files = 1
wall_time_sim = 0
