# Banana (Rosenbrock) benchmark - S-CREAM
model = banana.target : target.exp
output_dir = output_scream/
objfunc = direct_pass
fit_type = s_cream

uniform_var = x1 -5 5
uniform_var = x2 -5 15

population_size = 10
max_iterations = 5000
burn_in = 3000
sample_every = 10
output_hist_every = 50
hist_bins = 50
rhat_threshold = 0
verbosity = 2
delete_old_files = 1
wall_time_sim = 0
