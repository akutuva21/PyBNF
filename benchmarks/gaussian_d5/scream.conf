# Gaussian d=5 benchmark - SCREAM
model = gaussian_d5.target : target.exp
output_dir = output_scream/
objfunc = direct_pass
fit_type = scream

uniform_var = p1 -10 10
uniform_var = p2 -10 10
uniform_var = p3 -10 10
uniform_var = p4 -10 10
uniform_var = p5 -10 10

population_size = 10
max_iterations = 5000
burn_in = 2000
sample_every = 10
output_hist_every = 50
hist_bins = 50
rhat_threshold = 1.05
verbosity = 2
delete_old_files = 1
wall_time_sim = 0
