model = gaussian_d20.target : target.exp
output_dir = output_scream/
objfunc = direct_pass
fit_type = scream

uniform_var = p1 -10 10
uniform_var = p2 -10 10
uniform_var = p3 -10 10
uniform_var = p4 -10 10
uniform_var = p5 -10 10
uniform_var = p6 -10 10
uniform_var = p7 -10 10
uniform_var = p8 -10 10
uniform_var = p9 -10 10
uniform_var = p10 -10 10
uniform_var = p11 -10 10
uniform_var = p12 -10 10
uniform_var = p13 -10 10
uniform_var = p14 -10 10
uniform_var = p15 -10 10
uniform_var = p16 -10 10
uniform_var = p17 -10 10
uniform_var = p18 -10 10
uniform_var = p19 -10 10
