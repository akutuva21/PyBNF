# Validate DREAM algorithm distributions using the same trivial model as T5.
# The model output = c, data = 10 +/- 1, so the posterior for c should be
# Gaussian(10, 1). Parameters a and b are not constrained by data, so their
# posteriors should match their priors.

output_dir=T7-dream-trivial/fit

model = T7-dream-trivial/trivial.bngl : T7-dream-trivial/data.exp

fit_type = dream
objfunc = chi_sq

# Parameters - same as T5
normal_var = a__FREE 10 1
uniform_var = b__FREE 5 15
uniform_var = c__FREE 5 15

# DREAM needs population_size >= 3 for differential evolution donors.
# Use a larger population for better mixing.
population_size = 20

burn_in = 200
max_iterations = 1000
sample_every = 2
output_hist_every = 400
step_size = 0.5

verbosity = 1
output_every = 200
backup_every = 200
